name: Daily analytics to Notion

on:
  schedule:
    # Runs at 09:30 Asia/Shanghai every day.
    - cron: "30 1 * * *"
  workflow_dispatch:
    inputs:
      report_date:
        description: "Optional date to sync, in YYYY-MM-DD format. Defaults to yesterday in Asia/Shanghai."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: daily-analytics-to-notion
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync analytics to Notion
        env:
          GA_PROPERTY_ID: ${{ secrets.GA_PROPERTY_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SERVICE_ACCOUNT_B64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_B64 }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          REPORT_DATE: ${{ github.event.inputs.report_date }}
          REPORT_TIME_ZONE: Asia/Shanghai
          SITE_HOSTNAME: zengjianhao.github.io
          NOTION_TITLE_PROPERTY: ${{ vars.NOTION_TITLE_PROPERTY }}
          NOTION_DATE_PROPERTY: ${{ vars.NOTION_DATE_PROPERTY }}
          NOTION_PAGE_VIEWS_PROPERTY: ${{ vars.NOTION_PAGE_VIEWS_PROPERTY }}
          NOTION_ACTIVE_USERS_PROPERTY: ${{ vars.NOTION_ACTIVE_USERS_PROPERTY }}
          NOTION_SESSIONS_PROPERTY: ${{ vars.NOTION_SESSIONS_PROPERTY }}
          NOTION_NEW_USERS_PROPERTY: ${{ vars.NOTION_NEW_USERS_PROPERTY }}
          NOTION_EVENT_COUNT_PROPERTY: ${{ vars.NOTION_EVENT_COUNT_PROPERTY }}
          NOTION_TOP_PAGES_PROPERTY: ${{ vars.NOTION_TOP_PAGES_PROPERTY }}
          NOTION_SITE_PROPERTY: ${{ vars.NOTION_SITE_PROPERTY }}
          NOTION_GA_PROPERTY: ${{ vars.NOTION_GA_PROPERTY }}
        run: npm run sync:analytics
