<!doctype html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./output.css" rel="stylesheet">
    <title>Jianhao Zeng</title>
    <link rel="shortcut icon" href="./public/avatar.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Code:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
    <style>
        body.memory-lightbox-open {
            overflow: hidden;
        }

        .memory-image-card {
            display: block;
            width: 100%;
            cursor: zoom-in;
        }

        .memory-lightbox {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: grid;
            place-items: center;
            padding: clamp(1rem, 4vw, 3rem);
            background: rgba(80, 84, 90, 0.86);
        }

        .memory-lightbox[hidden] {
            display: none;
        }

        .memory-lightbox__image {
            width: auto;
            height: auto;
            max-width: min(92vw, 1200px);
            max-height: 86vh;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.28);
        }

        .memory-lightbox__button {
            position: absolute;
            display: grid;
            place-items: center;
            width: 2.75rem;
            height: 2.75rem;
            padding: 0;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.28);
            border-radius: 9999px;
            background: rgba(30, 33, 37, 0.72);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: background 150ms ease, transform 150ms ease;
        }

        .memory-lightbox__button:hover,
        .memory-lightbox__button:focus-visible {
            background: rgba(30, 33, 37, 0.92);
        }

        .memory-lightbox__button:focus-visible {
            outline: 2px solid rgba(255, 255, 255, 0.82);
            outline-offset: 3px;
        }

        .memory-lightbox__icon {
            display: block;
            width: 1.35rem;
            height: 1.35rem;
            fill: none;
            stroke: currentColor;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-width: 2;
        }

        .memory-lightbox__button--previous .memory-lightbox__icon,
        .memory-lightbox__button--next .memory-lightbox__icon {
            width: 1.6rem;
            height: 1.6rem;
        }

        .memory-lightbox__button--close {
            top: clamp(1rem, 3vw, 2rem);
            right: clamp(1rem, 3vw, 2rem);
        }

        .memory-lightbox__button--previous,
        .memory-lightbox__button--next {
            top: 50%;
        }

        .memory-lightbox__button--previous {
            left: clamp(1rem, 3vw, 2rem);
            transform: translateY(-50%);
        }

        .memory-lightbox__button--next {
            right: clamp(1rem, 3vw, 2rem);
            transform: translateY(-50%);
        }

        .memory-lightbox__button--previous:hover,
        .memory-lightbox__button--previous:focus-visible,
        .memory-lightbox__button--next:hover,
        .memory-lightbox__button--next:focus-visible {
            transform: translateY(-50%) scale(1.04);
        }

        @media (max-width: 520px) {
            .memory-lightbox {
                padding: 4rem 0.75rem;
            }

            .memory-lightbox__image {
                max-width: 100%;
                max-height: 82vh;
            }

            .memory-lightbox__button {
                width: 2.5rem;
                height: 2.5rem;
            }
        }
    </style>
</head>


<body class="
    w-full
    p-6 sm:p-10 md:p-14
    text-[14px] sm:text-[15px] md:text-[16px]
    leading-6 sm:leading-7 md:leading-7
    antialiased
">
    <div class="flex flex-col mobile:flex-row">
        <nav class="
            w-full mobile:w-24
            mr-0 mobile:mr-6 sm:mr-10 md:mr-14
        ">
            <ul class="
                mobile:sticky top-6 sm:top-10 md:top-14
                mb-6 mobile:mb-0
                flex flex-row justify-start items-end gap-2 mobile:flex-col
                font-lora italic
            ">
                <li class="text-rurikon-400 hover:text-rurikon-800 transition-colors -mx-4">
                    <a class="inline-block w-full px-4" draggable="false" href="./index.html">About</a>
                </li>
                <li class="text-rurikon-400 hover:text-rurikon-800 transition-colors -mx-4">
                    <a class="inline-block w-full px-4" draggable="false" href="./experience.html">Experience</a>
                </li>
                <li class="text-rurikon-400 hover:text-rurikon-800 transition-colors -mx-4">
                    <a class="inline-block w-full px-4" draggable="false" href="./publications.html">Publications</a>
                </li>
                <li class="text-rurikon-800 -mx-4">
                    <a class="inline-block w-full px-4" draggable="false" href="./memory.html">Memory</a>
                </li>
            </ul>
        </nav>


        <main class="relative flex-1 max-w-2xl">
            <div class="
                absolute
                w-full h-px mobile:h-full mobile:w-px
                opacity-50 mobile:opacity-100
                bg-rurikon-border mix-blend-multiply
                top-0 left-0
            ">
            </div>
            <article id="memory-gallery" class="
                font-merriweather
                pl-0 mobile:pl-6 sm:pl-10 md:pl-14
                pt-6 mobile:pt-0
            "></article>
        </main>
    </div>

    <div id="memory-lightbox" class="memory-lightbox" role="dialog" aria-modal="true" hidden>
        <button id="memory-lightbox-close" class="memory-lightbox__button memory-lightbox__button--close" type="button"
            aria-label="Close preview" title="Close preview">
            <svg class="memory-lightbox__icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M18 6 6 18"></path>
                <path d="M6 6 18 18"></path>
            </svg>
        </button>
        <button id="memory-lightbox-previous" class="memory-lightbox__button memory-lightbox__button--previous"
            type="button" aria-label="Previous image" title="Previous image">
            <svg class="memory-lightbox__icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="m15 18-6-6 6-6"></path>
            </svg>
        </button>
        <img id="memory-lightbox-image" class="memory-lightbox__image" alt="">
        <button id="memory-lightbox-next" class="memory-lightbox__button memory-lightbox__button--next" type="button"
            aria-label="Next image" title="Next image">
            <svg class="memory-lightbox__icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="m9 18 6-6-6-6"></path>
            </svg>
        </button>
    </div>

    <script src="./memory-images.js"></script>
    <script>
        const mobileMediaQuery = window.matchMedia("(min-width: 420px)");
        const cardClasses = "overflow-hidden rounded-lg shadow-sm aspect-[4/3] bg-gray-100";
        const columnClasses = "flex flex-col gap-4";
        const imageClasses = "w-full h-full object-cover";
        const lightbox = document.getElementById("memory-lightbox");
        const lightboxImage = document.getElementById("memory-lightbox-image");
        const lightboxCloseButton = document.getElementById("memory-lightbox-close");
        const lightboxPreviousButton = document.getElementById("memory-lightbox-previous");
        const lightboxNextButton = document.getElementById("memory-lightbox-next");
        let currentColumnCount = 0;
        let activeImageIndex = 0;
        let activeImageTrigger = null;

        const isAbsoluteUrl = (value) => {
            return /^https?:\/\//i.test(value);
        };

        const getImageUrl = (baseUrl, image) => {
            if (isAbsoluteUrl(image)) {
                return image;
            }

            const separator = baseUrl.endsWith("/") ? "" : "/";
            return `${baseUrl}${separator}${image}`;
        };

        const memoryImageGroups = window.memoryImageConfig.groups.map((group) => {
            return {
                year: group.year,
                images: group.images.map((image) => {
                    return {
                        alt: `${group.year} memory`,
                        src: getImageUrl(window.memoryImageConfig.baseUrl, image),
                    };
                }),
            };
        });

        const memoryImages = memoryImageGroups.flatMap((group) => group.images);
        memoryImages.forEach((image, index) => {
            image.index = index;
        });

        const revealImage = (img) => {
            const container = img.parentElement;
            if (!container) {
                return;
            }

            container.classList.remove("aspect-[4/3]", "bg-gray-100");
            img.classList.remove("h-full");
            img.classList.add("h-auto");
        };

        const showLightboxImage = (index) => {
            activeImageIndex = (index + memoryImages.length) % memoryImages.length;
            const image = memoryImages[activeImageIndex];

            lightboxImage.src = image.src;
            lightboxImage.alt = image.alt;
        };

        const openLightbox = (index, trigger) => {
            activeImageTrigger = trigger;
            showLightboxImage(index);
            lightbox.hidden = false;
            document.body.classList.add("memory-lightbox-open");
            lightboxCloseButton.focus();
        };

        const closeLightbox = () => {
            lightbox.hidden = true;
            lightboxImage.removeAttribute("src");
            document.body.classList.remove("memory-lightbox-open");

            if (activeImageTrigger && document.contains(activeImageTrigger)) {
                activeImageTrigger.focus();
            }
        };

        const moveLightbox = (step) => {
            showLightboxImage(activeImageIndex + step);
        };

        const createImageCard = (image) => {
            const container = document.createElement("button");
            container.type = "button";
            container.className = `${cardClasses} memory-image-card`;
            container.setAttribute("aria-label", `Open ${image.alt}`);
            container.addEventListener("click", () => openLightbox(image.index, container));

            const img = document.createElement("img");
            img.className = imageClasses;
            img.alt = image.alt;
            img.loading = "lazy";
            img.decoding = "async";
            img.addEventListener("load", () => revealImage(img), { once: true });
            img.src = image.src;
            container.append(img);

            if (img.complete && img.naturalWidth > 0) {
                revealImage(img);
            }

            return container;
        };

        const getColumnCount = () => {
            return mobileMediaQuery.matches ? 2 : 1;
        };

        const createMasonryList = (group, columnCount) => {
            const list = document.createElement("div");
            list.className = "mt-7";
            list.style.display = "grid";
            list.style.gridTemplateColumns = `repeat(${columnCount}, minmax(0, 1fr))`;
            list.style.gap = "1rem";

            const columns = Array.from({ length: columnCount }, () => {
                const column = document.createElement("div");
                column.className = columnClasses;
                list.append(column);
                return column;
            });

            group.images.forEach((image, index) => {
                columns[index % columnCount].append(createImageCard(image, group));
            });

            return list;
        };

        const renderMemoryGallery = () => {
            const gallery = document.getElementById("memory-gallery");
            const columnCount = getColumnCount();
            currentColumnCount = columnCount;
            gallery.replaceChildren();

            memoryImageGroups.forEach((group, groupIndex) => {
                const heading = document.createElement("h1");
                heading.className = `${groupIndex === 0 ? "" : "mt-7 "}font-semibold text-rurikon-800`;
                heading.textContent = group.year;
                gallery.append(heading);

                gallery.append(createMasonryList(group, columnCount));
            });
        };

        const handleMasonryBreakpointChange = () => {
            if (getColumnCount() !== currentColumnCount) {
                renderMemoryGallery();
            }
        };

        renderMemoryGallery();

        lightboxCloseButton.addEventListener("click", closeLightbox);
        lightboxPreviousButton.addEventListener("click", () => moveLightbox(-1));
        lightboxNextButton.addEventListener("click", () => moveLightbox(1));
        lightbox.addEventListener("click", (event) => {
            if (event.target === lightbox) {
                closeLightbox();
            }
        });

        document.addEventListener("keydown", (event) => {
            if (lightbox.hidden) {
                return;
            }

            if (event.key === "Escape") {
                closeLightbox();
            }

            if (event.key === "ArrowLeft") {
                moveLightbox(-1);
            }

            if (event.key === "ArrowRight") {
                moveLightbox(1);
            }
        });

        if (mobileMediaQuery.addEventListener) {
            mobileMediaQuery.addEventListener("change", handleMasonryBreakpointChange);
        } else {
            mobileMediaQuery.addListener(handleMasonryBreakpointChange);
        }
    </script>

</body>


</html>
